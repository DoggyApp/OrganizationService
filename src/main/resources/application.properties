spring.application.name=OrganizationService
server.port=8083

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/doggyapp}
spring.datasource.username=${DB_USERNAME:doggyapp}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# CORS — override with env var CORS_ALLOWED_ORIGIN in production
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}